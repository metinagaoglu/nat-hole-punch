networks:
  nat-network:
    driver: bridge

services:
  udp-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: udp-server
    ports:
      - "3986:3986/udp"
    environment:
      - SERVER_PORT=3986
      - SERVER_HOST=0.0.0.0
      - BUFFER_SIZE=1024
      - CLIENT_TTL=60
      - REPOSITORY_TYPE=memory
    restart: unless-stopped
    networks:
      - nat-network

  client1:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: client1
    command: [
      "-signal-address=udp-server:3986",
      "-local-address=0.0.0.0:4000",
      "-room-key=test-room"
    ]
    depends_on:
      - udp-server
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - nat-network

  client2:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: client2
    command: [
      "-signal-address=udp-server:3986",
      "-local-address=0.0.0.0:4001",
      "-room-key=test-room"
    ]
    depends_on:
      - udp-server
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - nat-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - nat-network

volumes:
  redis-data:
    driver: local
