name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run tests
      working-directory: ./server
      run: go test -v ./...

    - name: Build binaries
      run: |
        # Server builds
        GOOS=linux GOARCH=amd64 go build -o dist/server-linux-amd64 -ldflags="-s -w" ./server/cmd/main.go
        GOOS=linux GOARCH=arm64 go build -o dist/server-linux-arm64 -ldflags="-s -w" ./server/cmd/main.go
        GOOS=darwin GOARCH=amd64 go build -o dist/server-darwin-amd64 -ldflags="-s -w" ./server/cmd/main.go
        GOOS=darwin GOARCH=arm64 go build -o dist/server-darwin-arm64 -ldflags="-s -w" ./server/cmd/main.go
        GOOS=windows GOARCH=amd64 go build -o dist/server-windows-amd64.exe -ldflags="-s -w" ./server/cmd/main.go

        # Client builds
        GOOS=linux GOARCH=amd64 go build -o dist/client-linux-amd64 -ldflags="-s -w" ./client/client.go
        GOOS=linux GOARCH=arm64 go build -o dist/client-linux-arm64 -ldflags="-s -w" ./client/client.go
        GOOS=darwin GOARCH=amd64 go build -o dist/client-darwin-amd64 -ldflags="-s -w" ./client/client.go
        GOOS=darwin GOARCH=arm64 go build -o dist/client-darwin-arm64 -ldflags="-s -w" ./client/client.go
        GOOS=windows GOARCH=amd64 go build -o dist/client-windows-amd64.exe -ldflags="-s -w" ./client/client.go

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Generate changelog
      id: changelog
      run: |
        echo "## What's Changed" > CHANGELOG.md
        git log --oneline --no-merges $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
